<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTK Myanmar Mart - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .container { max-width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
        .header {
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
        }
        .header h1 { font-size: 22px; margin-bottom: 0.3rem; }
        .header p { font-size: 12px; opacity: 0.8; }
        .logout-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.25); }

        /* Login Screen */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
        }
        .login-box {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 380px;
            width: 90%;
        }
        .login-box h2 {
            font-size: 22px;
            margin-bottom: 0.5rem;
            color: #333;
            text-align: center;
        }
        .login-box .sub {
            font-size: 13px;
            color: #888;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block; }
        .form-input, .form-textarea {
            width: 100%;
            padding: 11px 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #6B4423;
            box-shadow: 0 0 0 3px rgba(107, 68, 35, 0.1);
        }
        .form-textarea { min-height: 80px; resize: vertical; }
        .login-button {
            width: 100%;
            padding: 12px;
            background: #2c2c2c;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .login-button:hover { background: #1a1a1a; }
        .login-error {
            background: #ffebee;
            color: #c53a30;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 13px;
            border-left: 3px solid #c53a30;
        }

        .nav-tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #ddd;
            overflow-x: auto;
        }
        .nav-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border: none;
            background: white;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
            min-width: 100px;
        }
        .nav-tab.active {
            color: #2c2c2c;
            border-bottom-color: #2c2c2c;
            background: #fafafa;
        }
        .content { flex: 1; padding: 1.5rem; max-width: 800px; margin: 0 auto; width: 100%; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .section { margin-bottom: 2rem; }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: #f0f0f0;
            border-radius: 8px;
            border-left: 3px solid #2c2c2c;
        }

        .product-edit {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .product-edit-img {
            width: 60px; height: 60px; background: #f0f0f0; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden; font-size: 28px; border: 1px dashed #ccc;
        }
        .product-edit-img img { width: 100%; height: 100%; object-fit: cover; }

        .button-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn {
            padding: 10px 16px; border-radius: 6px; border: 1px solid #ddd;
            background: white; cursor: pointer; font-size: 13px; font-weight: 500;
            flex: 1; min-width: 120px;
        }
        .btn:hover { background: #f9f9f9; }
        .btn-primary { background: #2c2c2c; color: white; border-color: #2c2c2c; }
        .btn-primary:hover { background: #1a1a1a; }
        .btn-danger { color: #C53A30; flex: none; min-width: auto; padding: 6px 12px; font-size: 12px; }
        .btn-danger:hover { background: rgba(197, 58, 48, 0.1); }

        .success-msg {
            background: #e8f5e9; color: #2B6F3D; padding: 10px 12px;
            border-radius: 6px; margin-top: 8px; font-size: 13px; border-left: 3px solid #2B6F3D;
        }

        .admin-list { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
        .admin-item {
            display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
            padding: 12px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 0.75rem;
        }
        .admin-item:last-child { margin-bottom: 0; }
        .admin-badge {
            display: inline-block; background: #e3f2fd; color: #1976d2;
            padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-top: 4px;
        }
        .admin-badge.owner { background: #fff3e0; color: #f57c00; }

        @media (max-width: 768px) {
            .content { padding: 1rem; }
            .nav-tab { min-width: 80px; padding: 0.75rem 0.5rem; font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 Admin Panel</h2>
            <div class="sub">TTK Myanmar Mart — Admin Only</div>
            <div id="loginError" class="login-error" style="display: none;"></div>
            
            <div class="form-group">
                <label class="form-label">အသုံးပြုသူ အမည်</label>
                <input type="text" id="loginUsername" class="form-input" placeholder="Username" onkeypress="if(event.key==='Enter') login()">
            </div>
            <div class="form-group">
                <label class="form-label">စကားဝှက်</label>
                <input type="password" id="loginPassword" class="form-input" placeholder="Password" onkeypress="if(event.key==='Enter') login()">
            </div>
            <button class="login-button" onclick="login()">🔓 ဝင်သည်</button>
        </div>
    </div>

    <!-- MAIN ADMIN APP -->
    <div id="mainApp" style="display: none;" class="container">
        <div class="header">
            <h1>⚙️ Admin Panel</h1>
            <p>👤 <span id="currentUser"></span> အဖြစ် ဝင်ထားသည်</p>
            <button class="logout-btn" onclick="logout()">🚪 ထွက်သည်</button>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('products', this)">📦 ကုန်စည်</button>
            <button class="nav-tab" onclick="switchTab('locations', this)">📍 Location</button>
            <button class="nav-tab" onclick="switchTab('business', this)">🏪 ကုန်သည်</button>
            <button class="nav-tab" onclick="switchTab('admins', this)">👥 Admin</button>
        </div>

        <div class="content">
            <!-- PRODUCTS TAB -->
            <div id="products" class="tab-pane active">
                <div class="section">
                    <div class="section-title">📦 ကုန်စည်ပြင်ဆင်ခြင်း</div>
                    <div id="productsEditContainer"></div>
                    <button class="btn btn-primary" onclick="addNewProduct()">+ ကုန်စည်ထည့်ရန်</button>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="saveProducts()">💾 ကုန်စည်များ သိမ်းဆည်းရန်</button>
                </div>
                <div id="productsMsg"></div>
            </div>

            <!-- LOCATIONS TAB -->
            <div id="locations" class="tab-pane">
                <div class="section">
                    <div class="section-title">📍 Location / Delivery Fee</div>
                    <div id="locationSettings"></div>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="saveLocations()">💾 Location များ သိမ်းဆည်းရန်</button>
                </div>
                <div id="locationsMsg"></div>
            </div>

            <!-- BUSINESS TAB -->
            <div id="business" class="tab-pane">
                <div class="section">
                    <div class="section-title">🏪 ကုန်သည်အချက်အလက်</div>
                    <div class="form-group">
                        <label class="form-label">ကုန်သည်အမည်</label>
                        <input type="text" id="businessName" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">နေရာတည်နေရာ</label>
                        <input type="text" id="businessAddress" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">ဖုန်းနံပါတ်</label>
                        <input type="text" id="businessPhoneNum" class="form-input" placeholder="+971 50 123 4567">
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="saveBusiness()">💾 ကုန်သည်အချက် သိမ်းဆည်းရန်</button>
                </div>
                <div id="businessMsg"></div>
            </div>

            <!-- ADMINS TAB -->
            <div id="admins" class="tab-pane">
                <div class="section">
                    <div class="section-title">👥 Admin အုံးတွေ့ရှိသူများ</div>
                    <div id="adminsList" class="admin-list"></div>
                </div>
                <div class="section">
                    <div class="section-title">➕ Admin အသစ်ထည့်သည်</div>
                    <div class="form-group">
                        <label class="form-label">အသုံးပြုသူ အမည်</label>
                        <input type="text" id="newAdminUsername" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">စကားဝှက်</label>
                        <input type="password" id="newAdminPassword" class="form-input">
                    </div>
                    <button class="btn btn-primary" onclick="addAdmin()">➕ Admin ထည့်သည်</button>
                    <div id="adminMsg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultAdmins = [
            { username: 'myolin', password: 'changeme123', role: 'owner' }
        ];

        const defaultProducts = [
            { id: 1, name_my: 'နံပါတ်သုံး', price: 12, emoji: '🌿', stock: 45, image: null },
            { id: 2, name_my: 'ငံ့ဆီ', price: 18, emoji: '🌶️', stock: 8, image: null },
            { id: 3, name_my: 'လက်သီးအစာ', price: 25, emoji: '🍵', stock: 32, image: null },
            { id: 4, name_my: 'ခြင်းအရည်', price: 22, emoji: '🦐', stock: 15, image: null },
            { id: 5, name_my: 'ဆန်ခါတင်း', price: 8, emoji: '🍜', stock: 120, image: null }
        ];

        const defaultLocations = [
            { id: 1, name: 'Abu Dhabi - Near (နီး)', fee: 15, freeFrom: 100 },
            { id: 2, name: 'Abu Dhabi - Far (ဝေး)', fee: 35, freeFrom: 999999 },
            { id: 3, name: 'UAE Other (အခြား)', fee: 35, freeFrom: 200 }
        ];

        const defaultBusiness = {
            name: 'TTK Myanmar Mart',
            address: 'Abu Dhabi, Hamdan Street',
            phone: '+971 50 123 4567'
        };

        let admins = JSON.parse(localStorage.getItem('ttk_admins')) || defaultAdmins;
        let products = JSON.parse(localStorage.getItem('ttk_products')) || defaultProducts;
        let locations = JSON.parse(localStorage.getItem('ttk_locations')) || defaultLocations;
        let business = JSON.parse(localStorage.getItem('ttk_business')) || defaultBusiness;
        let currentUser = null;

        function init() {
            const saved = sessionStorage.getItem('ttk_admin_session');
            if (saved) {
                currentUser = JSON.parse(saved);
                showMainApp();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
            }
        }

        function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showLoginError('Username နှင့် Password ထည့်သည်');
                return;
            }

            const admin = admins.find(a => a.username === username && a.password === password);

            if (admin) {
                currentUser = admin;
                sessionStorage.setItem('ttk_admin_session', JSON.stringify(admin));
                showMainApp();
            } else {
                showLoginError('Username သို့မဟုတ် Password မှားနေသည်');
            }
        }

        function showLoginError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function logout() {
            if (confirm('ထွက်မလား?')) {
                currentUser = null;
                sessionStorage.removeItem('ttk_admin_session');
                document.getElementById('mainApp').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
            }
        }

        function showMainApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('currentUser').textContent = currentUser.username;
            renderProductsEditor();
            renderLocationSettings();
            loadBusinessInfo();
            renderAdminsList();
        }

        function switchTab(tabName, btn) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            btn.classList.add('active');
        }

        // ---- PRODUCTS ----
        function renderProductsEditor() {
            const container = document.getElementById('productsEditContainer');
            container.innerHTML = products.map((p, idx) => `
                <div class="product-edit">
                    <div style="display: grid; grid-template-columns: 60px 1fr; gap: 12px; margin-bottom: 1rem;">
                        <div class="product-edit-img" onclick="document.getElementById('file-${idx}').click()">
                            ${p.image ? `<img src="${p.image}" alt="">` : p.emoji}
                        </div>
                        <div>
                            <input type="file" id="file-${idx}" style="display: none;" accept="image/*" onchange="handleImageUpload(${idx}, event)">
                            <p style="font-size: 12px; color: #666;">ပုံထည့်ရန် ကွင့်သည်</p>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: flex-end;">
                        <input type="text" placeholder="အမည်" value="${p.name_my}" onchange="updateProduct(${idx}, 'name_my', this.value)" style="padding: 6px 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 4px;">
                        <input type="number" placeholder="စျေးနှုန်း" value="${p.price}" onchange="updateProduct(${idx}, 'price', this.value)" style="padding: 6px 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 4px;">
                        <input type="number" placeholder="Stock" value="${p.stock}" onchange="updateProduct(${idx}, 'stock', this.value)" style="padding: 6px 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 4px;">
                        <button class="btn btn-danger" onclick="deleteProduct(${idx})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function handleImageUpload(idx, event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                products[idx].image = e.target.result;
                renderProductsEditor();
            };
            reader.readAsDataURL(file);
        }

        function updateProduct(idx, field, value) {
            products[idx][field] = (field === 'price' || field === 'stock') ? parseFloat(value) : value;
        }

        function deleteProduct(idx) {
            if (confirm('ဖျက်မလား?')) {
                products.splice(idx, 1);
                renderProductsEditor();
            }
        }

        function addNewProduct() {
            products.push({ id: Date.now(), name_my: 'ကုန်စည်အသစ်', price: 0, emoji: '📦', stock: 0, image: null });
            renderProductsEditor();
        }

        function saveProducts() {
            localStorage.setItem('ttk_products', JSON.stringify(products));
            showMsg('productsMsg', '✓ ကုန်စည်များ သိမ်းဆည်းပြီးပါပြီ');
        }

        // ---- LOCATIONS ----
        function renderLocationSettings() {
            const container = document.getElementById('locationSettings');
            container.innerHTML = locations.map((loc, idx) => `
                <div class="form-group">
                    <label class="form-label">Location ${idx + 1} အမည်</label>
                    <input type="text" class="form-input" value="${loc.name}" onchange="updateLocation(${idx}, 'name', this.value)">
                </div>
                <div class="form-group">
                    <label class="form-label">Delivery Fee (AED)</label>
                    <input type="number" class="form-input" value="${loc.fee}" onchange="updateLocation(${idx}, 'fee', this.value)">
                </div>
                <div class="form-group">
                    <label class="form-label">Free Delivery အတွက် အနည်းဆုံး ငွေ (AED)</label>
                    <input type="number" class="form-input" value="${loc.freeFrom}" onchange="updateLocation(${idx}, 'freeFrom', this.value)">
                </div>
                <hr style="margin: 1rem 0; border: none; border-top: 1px solid #ddd;">
            `).join('');
        }

        function updateLocation(idx, field, value) {
            locations[idx][field] = field === 'name' ? value : parseFloat(value);
        }

        function saveLocations() {
            localStorage.setItem('ttk_locations', JSON.stringify(locations));
            showMsg('locationsMsg', '✓ Location များ သိမ်းဆည်းပြီးပါပြီ');
        }

        // ---- BUSINESS ----
        function loadBusinessInfo() {
            document.getElementById('businessName').value = business.name;
            document.getElementById('businessAddress').value = business.address;
            document.getElementById('businessPhoneNum').value = business.phone;
        }

        function saveBusiness() {
            business.name = document.getElementById('businessName').value;
            business.address = document.getElementById('businessAddress').value;
            business.phone = document.getElementById('businessPhoneNum').value;
            localStorage.setItem('ttk_business', JSON.stringify(business));
            showMsg('businessMsg', '✓ ကုန်သည်အချက် သိမ်းဆည်းပြီးပါပြီ');
        }

        // ---- ADMINS ----
        function renderAdminsList() {
            const container = document.getElementById('adminsList');
            container.innerHTML = admins.map((admin, idx) => `
                <div class="admin-item">
                    <div>
                        <div style="font-weight: 600;">👤 ${admin.username}</div>
                        <span class="admin-badge ${admin.role === 'owner' ? 'owner' : ''}">
                            ${admin.role === 'owner' ? '👑 Owner' : 'Admin'}
                        </span>
                    </div>
                    <button class="btn btn-danger" onclick="deleteAdmin(${idx})"
                        ${admin.username === currentUser.username || (admin.role === 'owner' && currentUser.role !== 'owner') ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>
                        🗑️ ဖျက်ရန်
                    </button>
                </div>
            `).join('');
        }

        function addAdmin() {
            const username = document.getElementById('newAdminUsername').value;
            const password = document.getElementById('newAdminPassword').value;

            if (!username || !password) {
                showMsg('adminMsg', '⚠ Username နှင့် Password ထည့်သည်', true);
                return;
            }
            if (admins.find(a => a.username === username)) {
                showMsg('adminMsg', '⚠ ဒီ Username ရှိပြီးပါပြီ', true);
                return;
            }

            admins.push({ username, password, role: 'admin' });
            localStorage.setItem('ttk_admins', JSON.stringify(admins));
            document.getElementById('newAdminUsername').value = '';
            document.getElementById('newAdminPassword').value = '';
            renderAdminsList();
            showMsg('adminMsg', `✓ ${username} ကို Admin အဖြစ် ထည့်ပြီးပါပြီ`);
        }

        function deleteAdmin(idx) {
            const admin = admins[idx];
            if (admin.username === currentUser.username) {
                showMsg('adminMsg', '⚠ ကိုယ်သည့်ကို ဖျက်မရပါ', true);
                return;
            }
            if (admin.role === 'owner' && currentUser.role !== 'owner') {
                showMsg('adminMsg', '⚠ Owner ကို ဖျက်ခွင့်မရှိပါ', true);
                return;
            }
            if (confirm(`${admin.username} ကို ဖျက်မလား?`)) {
                admins.splice(idx, 1);
                localStorage.setItem('ttk_admins', JSON.stringify(admins));
                renderAdminsList();
                showMsg('adminMsg', `✓ ${admin.username} ဖျက်ပြီးပါပြီ`);
            }
        }

        function showMsg(elementId, msg, isError) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="${isError ? 'success-msg' : 'success-msg'}" style="${isError ? 'background:#ffebee;color:#c53a30;border-left-color:#c53a30;' : ''}">${msg}</div>`;
            setTimeout(() => el.innerHTML = '', 3000);
        }

        init();
    </script>
</body>
</html>
